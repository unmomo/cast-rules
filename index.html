<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アンモモ キャストルール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      font-size: 14px;
      line-height: 1.8;
      color: #2c2c2c;
      background: #f5f5f5;
    }
    .page {
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      padding: 24px 20px;
    }
    .doc-title {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a2e;
      border-bottom: 3px solid #c8a97a;
      padding-bottom: 10px;
      margin-bottom: 24px;
      text-align: center;
    }

    /* アコーディオン */
    .accordion {
      margin-bottom: 12px;
      border: 1px solid #e0d5c5;
      border-radius: 10px;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #fdf6ee;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .accordion-header:active {
      background: #f5ece0;
    }
    .accordion-header h2 {
      font-size: 15px;
      font-weight: bold;
      color: #8b6914;
      margin: 0;
    }
    .accordion-arrow {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-left: 12px;
      transition: transform 0.3s;
      color: #c8a97a;
      font-size: 18px;
      line-height: 20px;
      text-align: center;
    }
    .accordion.open .accordion-arrow {
      transform: rotate(180deg);
    }
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .accordion.open .accordion-body {
      max-height: none;
    }
    .accordion-content {
      padding: 20px;
      border-top: 1px solid #e8d5b0;
    }
    .accordion-content p {
      margin-bottom: 12px;
    }
    .accordion-content ul {
      padding-left: 20px;
      margin-bottom: 12px;
    }
    .accordion-content li {
      margin-bottom: 4px;
    }
    .accordion-content .sub-title {
      font-size: 14px;
      font-weight: bold;
      color: #1a1a2e;
      margin: 16px 0 8px;
      padding-left: 10px;
      border-left: 3px solid #c8a97a;
    }
    .accordion-content .note {
      background: #fff8f0;
      border: 1px solid #e8d5b0;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 12px 0;
      font-size: 13px;
      color: #8b6914;
    }
    .accordion-content .ng {
      background: #fff5f5;
      border: 1px solid #e8b0b0;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 12px 0;
      font-size: 13px;
      color: #994444;
    }
    .placeholder {
      color: #aaa;
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    /* ローディング・アクセス制御 */
    .loading { text-align: center; padding: 60px 20px; font-size: 16px; color: #888; }
    .denied { text-align: center; padding: 60px 20px; }
    .denied h2 { color: #cc4444; margin-bottom: 16px; font-size: 18px; }
    .denied p { color: #666; }
    #user-id { font-size: 12px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <div id="loading" class="loading">読み込み中...</div>
  <div id="denied" class="denied" style="display:none;">
    <h2>アクセス権限がありません</h2>
    <p>管理者にお問い合わせください。</p>
    <p style="margin-top:20px;"><span id="user-id"></span></p>
  </div>
  <div id="content" class="page" style="display:none;">
    <h1 class="doc-title">アンモモ キャストルール</h1>

    <!-- 1. 禁止事項 -->

      <div class="accordion-header" onclick="toggleAccordion(this)">

      </div>
      <div class="accordion-body">

      <div class="accordion-body">

    <!-- 5. 合流・解散報告について -->

      </div>
      <div class="accordion-body">

    <!-- 6. 報酬報告のルール -->
    <div class="accordion">
      <div class="accordion-header" onclick="toggleAccordion(this)">

      </div>
      <div class="accordion-body">

      <div class="accordion-body">

    <!-- 9. 事務所の利用について -->

      </div>
      <div class="accordion-body">

    <!-- 10. Xの運用について -->
    <div class="accordion">
      <div class="accordion-header" onclick="toggleAccordion(this)">

      </div>
      <div class="accordion-body">
        <div class="accordion-content">

        </div>
      </div>
    </div>

  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    var LIFF_ID = "2009695251-rNMl5hWB";
    // ===== 許可リスト =====
    var ALLOWED_USERS = [
      "U47b29821ee6504a16f19b63c0186a7dc",
      "Uc549c8f86af5d193f88bcef359c67341"
    ];
    // =======================

    liff.init({ liffId: LIFF_ID }).then(function() {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      return liff.getProfile().then(function(profile) {
        var userId = profile.userId;
        var allowed = ALLOWED_USERS.indexOf(userId) !== -1;
        document.getElementById("loading").style.display = "none";
        if (allowed) {
          document.getElementById("content").style.display = "block";
        } else {
          document.getElementById("user-id").textContent = userId;
          document.getElementById("denied").style.display = "block";
        }
      });
    }).catch(function(err) {
      document.getElementById("loading").textContent = "エラー: " + err.message;
    });

    function toggleAccordion(header) {
      var accordion = header.parentElement;
      accordion.classList.toggle("open");
    }
  </script>
</body>
</html>
